<div ng-controller="PluginDeviceRemoteSettingsController">
    <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
    <div class="alert alert-success" ng-if="successMessage">{{successMessage}}</div>

    <form class="form-horizontal" ng-submit="saveSettings()">
        <div class="form-group">
            <label class="col-sm-3 control-label" localized>plugin.deviceremote.label.serverUrl</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" ng-model="settings.serverUrl"
                       placeholder="https://remote.example.com/web-admin/"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label" localized>plugin.deviceremote.label.serverSecret</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" ng-model="settings.serverSecret"/>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-8">
                <button type="submit" class="btn btn-primary" ng-disabled="busy" localized>button.save</button>
            </div>
        </div>
    </form>

    <p class="help-block" localized>plugin.deviceremote.settings.hint</p>
</div>
